<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Melike & Serkan ♥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #0a0a0a;
    color: #fff;
    font-family: 'Lato', sans-serif;
    touch-action: none;
  }

  /* ─── BAŞLANGIÇ ─── */
  #intro {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px 30px;
    transition: opacity 1.5s ease;
  }

  #intro .names {
    font-family: 'Dancing Script', cursive;
    font-size: 13vw;
    color: #fff;
    text-align: center;
    letter-spacing: 2px;
    line-height: 1.2;
    opacity: 0;
    animation: fadeUp 1.5s ease 0.4s forwards;
  }

  #intro .date {
    font-family: 'Lato', sans-serif;
    font-size: 3.2vw;
    color: rgba(255,200,180,0.8);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 14px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.5s ease 1s forwards;
  }

  #intro .heart-pulse {
    font-size: 10vw;
    margin-top: 30px;
    opacity: 0;
    animation: fadeUp 1s ease 1.8s forwards, pulse 1.5s ease 3s infinite;
  }

  #intro .start-btn {
    margin-top: 50px;
    padding: 18px 0;
    width: 75%;
    max-width: 280px;
    border: 1px solid rgba(255,255,255,0.35);
    background: transparent;
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 3.8vw;
    letter-spacing: 4px;
    text-transform: uppercase;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 1s ease 2.3s forwards;
    -webkit-appearance: none;
  }

  /* ─── SLİDESHOW ─── */
  #slideshow {
    position: fixed;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .slide.active { opacity: 1; }

  .slide-bg-blur {
    position: absolute;
    inset: -5%;
    background-size: cover;
    background-position: center;
    filter: blur(18px) brightness(0.5);
    transform: scale(1.1);
  }

  .slide-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
  }
  .slide.active .slide-img {
    animation: kenBurnsImg 6s ease forwards;
  }

  .slide-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.0) 25%,
      rgba(0,0,0,0.0) 50%,
      rgba(0,0,0,0.75) 100%
    );
  }

  .slide-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 30px 28px 110px;
    text-align: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.9s ease 0.7s, transform 0.9s ease 0.7s;
  }
  .slide.active .slide-caption {
    opacity: 1;
    transform: translateY(0);
  }

  .caption-number {
    display: block;
    font-size: 3vw;
    letter-spacing: 5px;
    color: rgba(255,200,160,0.75);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .caption-text {
    font-family: 'Playfair Display', serif;
    font-size: 6.5vw;
    line-height: 1.5;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.9);
  }

  .caption-sub {
    display: block;
    font-weight: 300;
    font-size: 3.8vw;
    color: rgba(255,255,255,0.6);
    margin-top: 8px;
    letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

  /* ─── PROGRESS ─── */
  #progress {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 7px;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.5s;
    align-items: center;
  }
  #progress.visible { opacity: 1; }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.4s ease;
    flex-shrink: 0;
  }
  .dot.active {
    background: #fff;
    transform: scale(1.6);
  }
  .dot.done { background: rgba(255,255,255,0.55); }

  /* ─── DOKUNMA İPUCU ─── */
  #tap-hint {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 3vw;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    z-index: 50;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #tap-hint.visible { opacity: 1; }

  /* ─── TEKLİF SAHNESİ ─── */
  #proposal {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    padding: 40px 30px;
  }
  #proposal.visible { opacity: 1; pointer-events: all; }

  .prop-top {
    font-size: 3vw;
    letter-spacing: 6px;
    color: rgba(255,200,160,0.7);
    text-transform: uppercase;
    opacity: 0;
    text-align: center;
  }
  #proposal.visible .prop-top { animation: fadeUp 1s ease 0.4s forwards; }

  .prop-question {
    font-family: 'Dancing Script', cursive;
    font-size: 14vw;
    color: #fff;
    text-align: center;
    line-height: 1.25;
    margin-top: 20px;
    opacity: 0;
  }
  #proposal.visible .prop-question { animation: fadeUp 1.2s ease 1s forwards; }

  .prop-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 4.2vw;
    color: rgba(255,255,255,0.6);
    margin-top: 20px;
    text-align: center;
    line-height: 1.7;
    opacity: 0;
  }
  #proposal.visible .prop-sub { animation: fadeUp 1s ease 1.8s forwards; }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 50px;
    width: 100%;
    max-width: 300px;
    opacity: 0;
  }
  #proposal.visible .btn-group { animation: fadeUp 1s ease 2.6s forwards; }

  .btn-yes {
    padding: 20px;
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Dancing Script', cursive;
    font-size: 7vw;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(231,76,60,0.4);
    width: 100%;
    -webkit-appearance: none;
    transition: transform 0.2s;
  }
  .btn-yes:active { transform: scale(0.97); }

  .btn-no {
    padding: 16px;
    background: transparent;
    color: rgba(255,255,255,0.3);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-size: 4vw;
    letter-spacing: 2px;
    cursor: pointer;
    width: 100%;
    -webkit-appearance: none;
    transition: all 0.3s;
    position: fixed;
  }

  /* ─── TEŞEKKÜR ─── */
  #thankyou {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    padding: 40px 30px;
  }
  #thankyou.visible { opacity: 1; pointer-events: all; }

  .ty-text {
    font-family: 'Dancing Script', cursive;
    font-size: 14vw;
    color: #fff;
    text-align: center;
    line-height: 1.35;
    opacity: 0;
    position: relative;
    z-index: 10;
  }
  #thankyou.visible .ty-text { animation: fadeUp 1.5s ease 0.4s forwards; }

  .ty-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 4.5vw;
    color: rgba(255,200,180,0.85);
    margin-top: 24px;
    text-align: center;
    line-height: 1.7;
    opacity: 0;
    position: relative;
    z-index: 10;
  }
  #thankyou.visible .ty-sub { animation: fadeUp 1s ease 1.4s forwards; }


  /* ─── KALPLEr ─── */
  #hearts-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    overflow: hidden;
  }
  .floating-heart {
    position: absolute;
    bottom: -60px;
    pointer-events: none;
    animation: floatHeart linear forwards;
  }

  /* ─── KONFETİ ─── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 8;
  }

  /* ─── ANİMASYONLAR ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes kenBurnsImg {
    0%   { transform: scale(1.0); }
    100% { transform: scale(1.10); }
  }

  /* ─── OTOMATİK GEÇİŞ PROGRESS BAR ─── */
  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: rgba(255,255,255,0.6);
    z-index: 60;
    transition: none;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.25); }
  }
  @keyframes floatHeart {
    0%   { transform: translateY(0) rotate(-10deg) scale(0.8); opacity: 1; }
    100% { transform: translateY(-110vh) rotate(10deg) scale(1.3); opacity: 0; }
  }
</style>
</head>
<body>

<!-- YouTube gizli oynatıcı -->
<div id="yt-player" style="position:fixed;width:1px;height:1px;top:0;left:-9999px;pointer-events:none;overflow:hidden;"></div>

<!-- BAŞLANGIÇ -->
<div id="intro">
  <div class="names">Melike<br>&<br>Serkan</div>
  <div class="date">10 · 05 · 2021</div>
  <div class="heart-pulse">♥</div>
  <button class="start-btn" onclick="startShow()">Hikayemize Başla</button>
</div>

<!-- SLİDESHOW -->
<div id="slideshow"></div>

<!-- PROGRESS -->
<div id="progress"></div>
<div id="progress-bar"></div>

<!-- TEKLİF -->
<div id="proposal">
  <span class="prop-top">Melike'ye Özel</span>
  <div class="prop-question">Benimle<br>Evlenir<br>Misin?</div>
  <div class="prop-sub">4 yıldır her güzel anım seninle<br>oldu. Bundan sonra da seninle olsun.</div>
  <div class="btn-group">
    <button class="btn-yes" onclick="sayYes()">Evet, Evet, Evet! 💍</button>
    <button class="btn-no" id="btn-no" ontouchstart="runAway(this)" onmouseover="runAway(this)" onclick="sayYes()">Hayır</button>
  </div>
</div>

<!-- TEŞEKKÜR -->
<div id="thankyou">
  <canvas id="confetti-canvas"></canvas>
  <div id="hearts-container"></div>
  <div class="ty-text">Seni<br>Seviyorum<br>Güzelim ♥</div>
  <div class="ty-sub">Hayatımın geri kalanını<br>seninle geçirmek istiyorum.</div>
</div>

<script>
// ─── HER FOTOĞRAF İÇİN BAŞLIK VE ALT METİN ───
// text ve sub kısımlarını kendi hikayenize göre düzenle!
const slides = [
  { img:"1.png",  number:"01 / 15", text:"10 Mayıs 2021",              sub:"Her şey bu günle başladı..." },
  { img:"2.png",  number:"02 / 15", text:"İlk anlarımız",              sub:"Seni tanıdığım için ne kadar şanslıyım" },
  { img:"3.png",  number:"03 / 15", text:"Birlikte güldük",            sub:"Seninle her şey daha güzel" },
  { img:"4.png",  number:"04 / 15", text:"Maceralarımız başladı",      sub:"Yanında olmak en güzel his" },
  { img:"5.png",  number:"05 / 15", text:"Her gün daha çok sevdim",    sub:"Farkında bile olmadan..." },
  { img:"6.png",  number:"06 / 15", text:"Mutlu anlar",                sub:"Seninle paylaşılan her an değerliydi" },
  { img:"7.png",  number:"07 / 15", text:"Zor günlerde yanındaydın",   sub:"Seninle her şey daha kolay oldu" },
  { img:"8.png",  number:"08 / 15", text:"Birlikte büyüdük",           sub:"Yıllar geçtikçe aramızdaki bağ güçlendi" },
  { img:"9.png",  number:"09 / 15", text:"Gülüşün beni büyülüyor",    sub:"Her gün seni görmeyi bekliyorum" },
  { img:"10.png", number:"10 / 15", text:"Seninle her yer güzel",      sub:"Mekan değil, insan önemli" },
  { img:"11.png", number:"11 / 15", text:"Anılar birikiyor",           sub:"Ve hepsi seninle" },
  { img:"12.png", number:"12 / 15", text:"Aklım hep sende",            sub:"Nereye gitsem seninle gidiyorum" },
  { img:"13.png", number:"13 / 15", text:"En güzel yolculuk",          sub:"Seninle geçen her dakika" },
  { img:"14.png", number:"14 / 15", text:"4 yıl geçti...",             sub:"Ve seni her gün daha çok seviyorum" },
  { img:"15.png", number:"15 / 15", text:"Şimdi sana sormak istiyorum",sub:"Devam etmek için dokun..." }
];

let current = -1;
let animating = false;
let slideshowActive = false;
let autoTimer = null;
const SLIDE_DURATION = 6000;

// ─── YOUTUBE API ───
var ytPlayer = null;
var ytReady  = false;

(function() {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    width: '1', height: '1',
    videoId: 'jwP1HRmDVII',
    playerVars: {
      autoplay: 1, controls: 0, disablekb: 1,
      fs: 0, iv_load_policy: 3, modestbranding: 1,
      playsinline: 1, rel: 0, mute: 1,
      loop: 1, playlist: 'jwP1HRmDVII'
    },
    events: {
      onReady: function(e) {
        ytReady = true;
        e.target.playVideo(); // sessiz başlar, tarayıcı izin verir
      }
    }
  });
}

// İlk dokunuşta sesi aç
function unmuteOnFirstTouch() {
  if (ytPlayer && ytReady) {
    ytPlayer.unMute();
    ytPlayer.setVolume(70);
  }
}
document.addEventListener('touchstart', unmuteOnFirstTouch, { once: true, passive: true });
document.addEventListener('click',      unmuteOnFirstTouch, { once: true });

// Slaytları oluştur
function buildSlides() {
  const container = document.getElementById('slideshow');
  const progress  = document.getElementById('progress');
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.id = 'slide-' + i;
    el.innerHTML = `
      <div class="slide-bg-blur" style="background-image:url('${s.img}')"></div>
      <img class="slide-img" src="${s.img}" />
      <div class="slide-overlay"></div>
      <div class="slide-caption">
        <div class="caption-text">${s.text}</div>
        <span class="caption-sub">${s.sub}</span>
      </div>`;
    container.appendChild(el);

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = 'dot-' + i;
    progress.appendChild(dot);
  });
}

// Başlat
function startShow() {
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  intro.style.pointerEvents = 'none';
  setTimeout(() => {
    intro.style.display = 'none';
    document.getElementById('slideshow').style.opacity = '1';
    document.getElementById('progress').classList.add('visible');
    slideshowActive = true;
    nextSlide();
  }, 1500);
}

// Sonraki slayt
function nextSlide() {
  if (animating) return;
  animating = true;

  if (current >= 0) {
    document.getElementById('slide-' + current)?.classList.remove('active');
    const oldDot = document.getElementById('dot-' + current);
    if (oldDot) { oldDot.classList.remove('active'); oldDot.classList.add('done'); }
  }
  current++;

  if (current >= slides.length) {
    showProposal();
    animating = false;
    return;
  }

  document.getElementById('slide-' + current)?.classList.add('active');
  const dot = document.getElementById('dot-' + current);
  if (dot) dot.classList.add('active');

  startProgressBar();

  setTimeout(() => { animating = false; }, 1400);

  autoTimer = setTimeout(nextSlide, SLIDE_DURATION);
}

function startProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
      bar.style.width = '100%';
    });
  });
}

// Teklif sahnesi
function showProposal() {
  clearTimeout(autoTimer);
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('slideshow').style.opacity = '0';
  document.getElementById('progress').classList.remove('visible');
  document.getElementById('tap-hint').classList.remove('visible');
  setTimeout(() => {
    document.getElementById('proposal').classList.add('visible');
  }, 900);
}

// Evet!
function sayYes() {
  const prop = document.getElementById('proposal');
  prop.style.opacity = '0';
  prop.style.pointerEvents = 'none';
  setTimeout(() => {
    prop.style.display = 'none';
    document.getElementById('thankyou').classList.add('visible');
    startHearts();
    startConfetti();
  }, 1200);
}

// Hayır butonu kaçıyor
function runAway(btn) {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const bw = 240, bh = 60;
  const x = Math.random() * (vw - bw);
  const y = Math.random() * (vh - bh);
  btn.style.left   = x + 'px';
  btn.style.top    = y + 'px';
  btn.style.right  = 'auto';
  btn.style.bottom = 'auto';
  btn.style.transition = 'left 0.25s, top 0.25s';
  btn.style.width  = bw + 'px';
}

// Müzik (yedek — startShow'dan çağrılmaz artık)
function playMusic() {
  if (ytReady && ytPlayer) {
    ytPlayer.unMute();
    ytPlayer.setVolume(70);
    ytPlayer.playVideo();
  }
}

// Yüzen kalpler
function startHearts() {
  const c = document.getElementById('hearts-container');
  const e = ['❤️','💕','💖','💗','💝','💍','✨','🌹'];
  setInterval(() => {
    const h = document.createElement('div');
    h.className = 'floating-heart';
    h.textContent = e[Math.floor(Math.random() * e.length)];
    h.style.left = (Math.random() * 90) + 'vw';
    h.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
    h.style.animationDuration = (3.5 + Math.random() * 3) + 's';
    c.appendChild(h);
    setTimeout(() => h.remove(), 7000);
  }, 350);
}

// Konfeti
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#e74c3c','#e91e63','#ff9800','#ffffff','#f06292','#ab47bc','#ffb300','#ff6b6b'];
  const pieces = Array.from({length: 200}, () => ({
    x:   Math.random() * canvas.width,
    y:  -20 - Math.random() * 300,
    w:   7 + Math.random() * 8,
    h:   3 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot:  Math.random() * Math.PI * 2,
    vx:  (Math.random() - 0.5) * 4,
    vy:   2 + Math.random() * 4,
    vr:  (Math.random() - 0.5) * 0.15
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.vr;
      if (p.y < canvas.height + 60) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
  }
  draw();
}

// Dokunma / kaydırma
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!slideshowActive) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const isProposal = document.getElementById('proposal').classList.contains('visible');
  const isThankYou = document.getElementById('thankyou').classList.contains('visible');
  if (isProposal || isThankYou) return;
  if (Math.abs(dx) > 30 || (Math.abs(dx) < 10 && Math.abs(dy) < 10)) {
    nextSlide();
  }
}, { passive: true });

// Klavye desteği
document.addEventListener('keydown', e => {
  if (['Space','ArrowRight','Enter'].includes(e.code)) {
    const isProposal = document.getElementById('proposal').classList.contains('visible');
    const isThankYou = document.getElementById('thankyou').classList.contains('visible');
    if (!isProposal && !isThankYou) nextSlide();
  }
});

buildSlides();
</script>
</body>
</html>
